name: PHP Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  syntax:
    name: PHP Syntax Check
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Plugin declares `Requires PHP: 8.0` — match expressions and
        # other 8.x-only syntax mean 7.4 cannot parse the codebase.
        # Test the declared minimum (8.0) through the version the dev
        # environment runs (8.4).
        php-version: ["8.0", "8.1", "8.2", "8.3", "8.4"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: none

      - name: Check PHP syntax
        run: |
          find . -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./node_modules/*" \
            -print0 | xargs -0 -n1 php -l
          echo "All PHP files passed syntax check."
